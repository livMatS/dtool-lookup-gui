name: build-on-ubuntu

on:
  workflow_call:
  push:
    branches:
      - local-test

jobs:

  build:

    runs-on: ubuntu-24.04
      
    steps:

    - name: checkout
      uses: actions/checkout@v4

    - name: Get history and tags for SCM versioning to work
      run: |
        git fetch --prune --unshallow || true  # no-op if already a full clone (e.g. act local run)
        git fetch --depth=1 origin +refs/tags/*:refs/tags/* || true

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install system dependencies
      run: |
        sudo apt-get update -qy
        sudo apt-get install -y \
          libgirepository1.0-dev \
          libgirepository-2.0-dev \
          libcairo2-dev \
          pkg-config \
          python3-dev \
          gir1.2-gtk-3.0 \
          gir1.2-gtksource-4 \
          libgtksourceview-4-0 \
          xvfb

    - name: Log system package info
      run: |
        echo "### lsb_release -a ###"
        lsb_release -a | tee lsb_release_a.txt
        echo "### uname -a ###"
        uname -a | tee uname_a.txt
        echo "### apt list --installed ###"
        apt list --installed | tee apt_list_installed.txt
        echo "### GI typelib directory ###"
        ls /usr/lib/x86_64-linux-gnu/girepository-1.0/ | tee typelib_list.txt

    - name: Install pythonic dependencies
      run: |
        pip install --upgrade pip
        pip install wheel setuptools_scm pyinstaller-hooks-contrib
        pip install -r pyinstaller/linux/requirements.txt
        pip install pyinstaller

    - name: Patch dtool-cli for Python 3.12+ (pkg_resources → importlib.metadata)
      # dtool-cli 0.7.1 uses pkg_resources which is not available in Python 3.12+.
      # click-plugins 1.1.1.x accesses ep.module_name (pkg_resources API) on entry points.
      # We replace pkg_resources.iter_entry_points with a shim whose objects expose
      # .module_name so click-plugins keeps working.
      # Until fixed releases are available on PyPI, patch the installed copies inline.
      run: |
        python - << 'EOF'
        import importlib.util, pathlib, sys

        def patch_file(module_name, old, new):
            spec = importlib.util.find_spec(module_name)
            if spec is None:
                print(f"{module_name} not found, skipping", file=sys.stderr)
                return False
            p = pathlib.Path(spec.origin)
            src = p.read_text()
            if old not in src:
                print(f"Pattern not found in {p}; may be already patched or different version")
                return False
            p.write_text(src.replace(old, new))
            print(f"Patched {p}")
            return True

        # --- Patch dtool_cli: replace pkg_resources.iter_entry_points with a shim
        # that returns compat wrappers exposing .module_name for click-plugins.
        patch_file(
            "dtool_cli.cli",
            "from pkg_resources import iter_entry_points",
            """try:
    from importlib.metadata import entry_points as _eps

    class _EPCompat:
        \"\"\"Wrap importlib.metadata EntryPoint to add pkg_resources-style attrs.\"\"\"
        def __init__(self, ep):
            self._ep = ep
            self.name = ep.name
            self.group = ep.group
            self.value = ep.value
            # pkg_resources compat: module_name / attrs used by click-plugins
            parts = ep.value.split(":")
            self.module_name = parts[0]
            self.attrs = parts[1].split(".") if len(parts) > 1 else []

        def load(self):
            return self._ep.load()

        def __repr__(self):
            return f"_EPCompat({self._ep!r})"

    def iter_entry_points(group, name=None):
        eps = _eps(group=group)
        if name is not None:
            eps = [e for e in eps if e.name == name]
        return [_EPCompat(e) for e in eps]

except ImportError:
    from pkg_resources import iter_entry_points"""
        )
        EOF

    - name: Fix setuptools_scm-generated version
      id: fix_version
      run: |
        version=$(SETUPTOOLS_SCM_DEBUG=1 python -m setuptools_scm)  # have version written to file to appear in bundled app as well
        echo "version=$version" >> $GITHUB_OUTPUT

    - name: Log python package info
      run: |
        echo "### pip freeze ###"
        pip freeze | tee pip_freeze.txt

    - name: Compile gschemas
      run: |
        glib-compile-schemas .
      working-directory: dtool_lookup_gui

    - name: Package executable with pyinstaller
      # Run under xvfb so PyInstaller's GI hook child processes can initialise
      # GTK (gi._get_module_info) without "cannot open display" errors.
      # Also set GI_TYPELIB_PATH and GDK_BACKEND explicitly as belt-and-suspenders.
      env:
        GI_TYPELIB_PATH: /usr/lib/x86_64-linux-gnu/girepository-1.0
        GDK_BACKEND: x11
      run: |
        xvfb-run --auto-servernum \
          pyinstaller -y ./pyinstaller/linux/dtool-lookup-gui-linux-one-file.spec 2>&1 | tee pyinstaller.log
        mv dist/dtool-lookup-gui dtool-lookup-gui
        chmod +x dtool-lookup-gui

    - name: Smoke-test bundle (headless)
      # Verify the bundle starts without immediately crashing.
      # xvfb-run provides a display; timeout 10s means success if no crash within 10s.
      run: |
        set +e
        xvfb-run --auto-servernum timeout 10 ./dtool-lookup-gui > /tmp/bundle-smoke.log 2>&1
        EXIT=$?
        set -e
        echo "--- bundle output ---"
        cat /tmp/bundle-smoke.log
        echo "--- end output ---"
        # exit 124 = timeout (app was still running) = PASS
        # exit 0   = clean exit                      = PASS
        # anything else                              = FAIL
        if [ "$EXIT" -ne 124 ] && [ "$EXIT" -ne 0 ]; then
          echo "FAIL: bundle crashed with exit code $EXIT"
          exit 1
        fi
        echo "PASS: exit=$EXIT"

    # use tar here, see https://github.com/actions/upload-artifact/issues/38
    - name: Pack build assets
      run: |
        bash -c "tar -cvf dtool-lookup-gui-linux.tar $(xargs -a pyinstaller/MANIFEST.linux)"

    - name: Collect release assets
      run: |
        prefix=$(pwd)
        mkdir -p /tmp/release
        bash ${prefix}/maintenance/copy_files_into_folders.sh \
             ${prefix}/pyinstaller/MANIFEST.general /tmp/release
        bash ${prefix}/maintenance/copy_files_into_folders.sh \
             ${prefix}/pyinstaller/MANIFEST.linux-release /tmp/release

    - name: List content of release
      run: |
        ls -lhv /tmp/release/

    - name: Pack release assets
      run: |
        cd /tmp/release \
          && tar -cvzf dtool-lookup-gui-${{ steps.fix_version.outputs.version }}-linux.tar.gz ./*

    - name: List packed release
      run: |
        ls -lhv /tmp/release/

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dtool-lookup-gui-linux
        path: dtool-lookup-gui-linux.tar
        if-no-files-found: error

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: dtool-lookup-gui-linux-release
        path: /tmp/release/dtool-lookup-gui-${{ steps.fix_version.outputs.version }}-linux.tar.gz
        if-no-files-found: error
